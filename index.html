<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Solar System</title>
    <style>
        /* ===== CSS ===== */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a0a23; /* خلفية كحلي غامق */
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin-top: 20px;
        }

        p.subtitle {
            font-size: 1.5em;
            margin-bottom: 30px;
        }

        .planets {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .planet-container {
            width: 150px;
            cursor: pointer;
        }

        .planet-container img {
            width: 100%;
            transition: transform 0.3s;
            border-radius: 50%;
        }

        .planet-container img:hover {
            transform: scale(1.2); /* تأثير hover */
        }

        .planet-container p {
            margin-top: 5px;
            font-weight: bold;
        }

        #planet-info {
            margin-top: 30px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #1a1a3b;
            color: white;
        }

        button:hover {
            background-color: #333366;
        }
    </style>
</head>
